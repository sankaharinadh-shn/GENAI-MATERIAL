apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: travel-mcp-server
  namespace: travel-mcp
  labels:
    app.kubernetes.io/name: travel-mcp-server
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: travel-langgraph-agent-mcp
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: travel-mcp-server
                port:
                  number: 8000
  # Enable this after installing cert-manager and creating a ClusterIssuer.
  # tls:
  #   - hosts:
  #       - travel-mcp.example.com
  #     secretName: travel-mcp-server-tls
