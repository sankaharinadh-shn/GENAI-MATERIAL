apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-mcp-server
  namespace: travel-mcp
  labels:
    app.kubernetes.io/name: travel-mcp-server
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: travel-langgraph-agent-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: travel-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: travel-mcp-server
        app.kubernetes.io/component: mcp-server
        app.kubernetes.io/part-of: travel-langgraph-agent-mcp
    spec:
      nodeSelector:
        eks.amazonaws.com/nodegroup: "public-nodes"
      containers:
        - name: mcp
          image: 111122223333.dkr.ecr.us-east-1.amazonaws.com/travel-mcp-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: TRAVEL_AGENT_API_URL
              valueFrom:
                configMapKeyRef:
                  name: travel-mcp-config
                  key: TRAVEL_AGENT_API_URL
            - name: MCP_SERVER_NAME
              value: "Travel Booking MCP Server"
            - name: REQUEST_TIMEOUT_SECONDS
              value: "90"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          # resources:
          #   requests:
          #     cpu: 100m
          #     memory: 256Mi
          #   limits:
          #     cpu: 500m
          #     memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: travel-mcp-server
  namespace: travel-mcp
  labels:
    app.kubernetes.io/name: travel-mcp-server
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: travel-langgraph-agent-mcp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: travel-mcp-server
  ports:
    - name: http
      port: 8000
      targetPort: http
