name: Build and Deploy Travel MCP Stack to EKS

on:
  push:
    branches:
      - master
    paths:
      - "TRAVEL-LANGGRAPH-AGENT-MCP/**"
      - ".github/workflows/deploy-travel-mcp-eks.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to build and deploy. Use 'sha' to deploy the commit SHA."
        required: true
        default: "sha"
      ingress_host:
        description: "Public hostname for the MCP endpoint"
        required: true
        default: "travel-mcp.example.com"
      run_schema_setup:
        description: "Run LangGraph/checkpoint and bookings table setup"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

env:
  PROJECT_DIR: TRAVEL-LANGGRAPH-AGENT-MCP
  NAMESPACE: travel-mcp
  BACKEND_ECR_REPOSITORY: travel-langgraph-agent
  MCP_ECR_REPOSITORY: travel-mcp-server

jobs:
  build-and-deploy:
    name: Build Images and Deploy to EKS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${{ secrets.EKS_CLUSTER_NAME }}" \
            --region "${{ secrets.AWS_REGION }}"

      - name: Resolve image tag
        id: image
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          if [ -z "${INPUT_TAG}" ] || [ "${INPUT_TAG}" = "sha" ]; then
            echo "tag=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          else
            echo "tag=${INPUT_TAG}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Ensure ECR repositories exist
        run: |
          set -euo pipefail

          for repo in "${BACKEND_ECR_REPOSITORY}" "${MCP_ECR_REPOSITORY}"; do
            aws ecr describe-repositories --repository-names "${repo}" >/dev/null 2>&1 || \
              aws ecr create-repository --repository-name "${repo}" >/dev/null
          done

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          set -euo pipefail

          docker build \
            -t "${ECR_REGISTRY}/${BACKEND_ECR_REPOSITORY}:${IMAGE_TAG}" \
            -t "${ECR_REGISTRY}/${BACKEND_ECR_REPOSITORY}:latest" \
            "${PROJECT_DIR}/langgraph-agent"

          docker push "${ECR_REGISTRY}/${BACKEND_ECR_REPOSITORY}:${IMAGE_TAG}"
          docker push "${ECR_REGISTRY}/${BACKEND_ECR_REPOSITORY}:latest"

      - name: Build and push MCP server image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          set -euo pipefail

          docker build \
            -t "${ECR_REGISTRY}/${MCP_ECR_REPOSITORY}:${IMAGE_TAG}" \
            -t "${ECR_REGISTRY}/${MCP_ECR_REPOSITORY}:latest" \
            "${PROJECT_DIR}/travel-mcp-server"

          docker push "${ECR_REGISTRY}/${MCP_ECR_REPOSITORY}:${IMAGE_TAG}"
          docker push "${ECR_REGISTRY}/${MCP_ECR_REPOSITORY}:latest"

      - name: Render Kubernetes manifests
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
          INGRESS_HOST: ${{ inputs.ingress_host }}
          RUN_SCHEMA_SETUP: ${{ inputs.run_schema_setup }}
        run: |
          set -euo pipefail

          INGRESS_HOST="${INGRESS_HOST:-travel-mcp.example.com}"
          RUN_SCHEMA_SETUP="${RUN_SCHEMA_SETUP:-false}"

          rm -rf rendered-k8s
          mkdir -p rendered-k8s

          cp "${PROJECT_DIR}/k8s/00-namespace.yaml" rendered-k8s/
          cp "${PROJECT_DIR}/k8s/01-configmap.yaml" rendered-k8s/
          cp "${PROJECT_DIR}/k8s/03-langgraph-agent.yaml" rendered-k8s/
          cp "${PROJECT_DIR}/k8s/04-mcp-server.yaml" rendered-k8s/
          cp "${PROJECT_DIR}/k8s/05-ingress.yaml" rendered-k8s/
          cp "${PROJECT_DIR}/k8s/06-hpa.yaml" rendered-k8s/

          BACKEND_IMAGE="${ECR_REGISTRY}/${BACKEND_ECR_REPOSITORY}:${IMAGE_TAG}"
          MCP_IMAGE="${ECR_REGISTRY}/${MCP_ECR_REPOSITORY}:${IMAGE_TAG}"

          sed -i "s|111122223333.dkr.ecr.us-east-1.amazonaws.com/travel-langgraph-agent:latest|${BACKEND_IMAGE}|g" rendered-k8s/03-langgraph-agent.yaml
          sed -i "s|111122223333.dkr.ecr.us-east-1.amazonaws.com/travel-mcp-server:latest|${MCP_IMAGE}|g" rendered-k8s/04-mcp-server.yaml
          sed -i "s|travel-mcp.example.com|${INGRESS_HOST}|g" rendered-k8s/05-ingress.yaml
          sed -i "s|LANGGRAPH_POSTGRES_SETUP: \"true\"|LANGGRAPH_POSTGRES_SETUP: \"${RUN_SCHEMA_SETUP}\"|g" rendered-k8s/01-configmap.yaml
          sed -i "s|LANGGRAPH_POSTGRES_SETUP: \"false\"|LANGGRAPH_POSTGRES_SETUP: \"${RUN_SCHEMA_SETUP}\"|g" rendered-k8s/01-configmap.yaml
          sed -i "s|BOOKINGS_TABLE_SETUP: \"true\"|BOOKINGS_TABLE_SETUP: \"${RUN_SCHEMA_SETUP}\"|g" rendered-k8s/01-configmap.yaml
          sed -i "s|BOOKINGS_TABLE_SETUP: \"false\"|BOOKINGS_TABLE_SETUP: \"${RUN_SCHEMA_SETUP}\"|g" rendered-k8s/01-configmap.yaml

          if [ "${RUN_SCHEMA_SETUP}" = "true" ]; then
            python - <<'PY'
          from pathlib import Path

          path = Path("rendered-k8s/03-langgraph-agent.yaml")
          text = path.read_text()
          text = text.replace("replicas: 2", "replicas: 1", 1)
          path.write_text(text)
          PY
          fi

      - name: Apply namespace
        run: kubectl apply -f rendered-k8s/00-namespace.yaml

      - name: Apply runtime secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          DUFFEL_ACCESS_TOKEN: ${{ secrets.DUFFEL_ACCESS_TOKEN }}
          LANGGRAPH_POSTGRES_URI: ${{ secrets.LANGGRAPH_POSTGRES_URI }}
        run: |
          set -euo pipefail

          kubectl create secret generic travel-mcp-secrets \
            --namespace "${NAMESPACE}" \
            --from-literal=OPENAI_API_KEY="${OPENAI_API_KEY}" \
            --from-literal=SERPAPI_API_KEY="${SERPAPI_API_KEY}" \
            --from-literal=DUFFEL_ACCESS_TOKEN="${DUFFEL_ACCESS_TOKEN}" \
            --from-literal=LANGGRAPH_POSTGRES_URI="${LANGGRAPH_POSTGRES_URI}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: |
          kubectl apply -f rendered-k8s/01-configmap.yaml
          kubectl apply -f rendered-k8s/03-langgraph-agent.yaml
          kubectl apply -f rendered-k8s/04-mcp-server.yaml
          kubectl apply -f rendered-k8s/05-ingress.yaml
          kubectl apply -f rendered-k8s/06-hpa.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/travel-langgraph-agent -n "${NAMESPACE}" --timeout=300s
          kubectl rollout status deployment/travel-mcp-server -n "${NAMESPACE}" --timeout=300s

      - name: Show deployment summary
        if: always()
        run: |
          kubectl get pods -n "${NAMESPACE}" -o wide
          kubectl get svc -n "${NAMESPACE}"
          kubectl get ingress -n "${NAMESPACE}"
