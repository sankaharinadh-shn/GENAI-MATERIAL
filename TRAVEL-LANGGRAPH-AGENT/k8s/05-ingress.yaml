apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: travel-agent-ui
  namespace: travel-agent
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service: 
            name: travel-agent-ui
            port:
              number: 8000
